{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">Edit Profile</h1>

<div class="card p-4">

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <h4 class="mb-3">Account Information</h4>

        {{ user_form.as_p }}

        <hr>

        <h4 class="mb-3">Profile Information</h4>

        {{ profile_form.as_p }}

        <button
            type="submit"
            class="btn btn-primary mt-3"
        >
            Save Changes
        </button>

        <a
            href="{% url 'profile' %}"
            class="btn btn-secondary mt-3"
        >
            Cancel
        </a>

    </form>

</div>

{% endblock %}
