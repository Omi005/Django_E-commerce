{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">My Orders</h1>

{% for order in orders %}

<div class="card p-3 mb-3">

    <h4>
    <a
        href="{% url 'order_detail' order.id %}"
        class="text-decoration-none"
    >
        Order #{{ order.id }}
    </a>
</h4>

    <p>
        <strong>Date:</strong>
        {{ order.created_at }}
    </p>

    <p>
        <strong>Status:</strong>
        {{ order.status }}
    </p>

    <p>
        <strong>Total:</strong>
        ₹{{ order.total_price }}
    </p>

</div>

{% empty %}

<div class="alert alert-warning">

    You haven't placed any orders yet.

</div>

{% endfor %}

{% endblock %}
