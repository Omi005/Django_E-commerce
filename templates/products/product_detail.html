{% extends 'base.html' %}

{% block content %}

<div class="card p-4">

    {% if product.image %}
        <img
    src="{{ product.image.url }}"
    class="img-fluid rounded mb-3"
    style="
        max-height:300px;
        width:100%;
        object-fit:contain;
        background:#f8f9fa;
    "
>
    {% endif %}

    <h2>{{ product.name }}</h2>

    <p>
        <strong>Category:</strong>
        {{ product.category.name }}
    </p>

    <p>
        <strong>Description:</strong><br>
        {{ product.description }}
    </p>

    <p>
        <strong>Price:</strong>
        ₹{{ product.price }}
    </p>

    <p>
        <strong>Stock:</strong>
        {{ product.stock }}
    </p>

    <a
    href="{% url 'add_to_cart' product.id %}"
    class="btn btn-primary me-2"
>
    🛒 Add to Cart
</a>

<a
    href="{% url 'add_to_wishlist' product.id %}"
    class="btn btn-outline-danger"
>
    ❤️ Add to Wishlist
</a>

</div>

{% endblock %}
